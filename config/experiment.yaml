# FHIRBench Experiment Configuration
experiment:
  name: "fhirbench-v1"
  seed: 42
  description: "Evaluating FHIR serialization strategies for clinical LLM tasks"

# AWS Configuration
aws:
  region: "us-east-1"

# Data generation settings
data:
  n_patients: 1000
  conditions:
    - diabetes
    - cardiovascular
    - medication_interactions
    - preventive_care
  patients_per_condition: 250
  data_dir: "data/fhir_bundles"

# Serialization strategies
serializers:
  - raw_json
  - flattened_kv
  - narrative
  - structured_markdown
  - clinical_template
  - hybrid_adaptive

# Terminology resolution mode (for flattened_kv serializer)
terminology_resolution: codes_with_display

# Models (all via Bedrock Converse API)
models:
  - id: claude-sonnet-4.5
    provider: bedrock
    model_id: "anthropic.claude-sonnet-4-5-20260301-v1:0"
    max_tokens: 2048
    temperature: 0.0

  - id: gpt-5.4
    provider: bedrock
    model_id: "openai.gpt-5-4"
    max_tokens: 2048
    temperature: 0.0

  - id: llama-3-70b
    provider: bedrock
    model_id: "meta.llama3-70b-instruct-v1:0"
    max_tokens: 2048
    temperature: 0.0

  - id: deepseek-v3.2
    provider: bedrock
    model_id: "deepseek.deepseek-v3-2"
    max_tokens: 2048
    temperature: 0.0

  - id: qwen3-32b
    provider: bedrock
    model_id: "qwen.qwen3-32b"
    max_tokens: 2048
    temperature: 0.0

# Task types
tasks:
  - clinical_qa
  - clinical_reasoning
  - clinical_summarization

# Evaluation settings
evaluation:
  n_samples_per_condition: 50
  temperature: 0.0
  max_tokens: 2048
  scoring_weights:
    accuracy: 1.0
    relevance: 0.8
    completeness: 0.9
    safety: 1.5

# Output settings
output:
  results_dir: "results"
  save_predictions: true
  save_prompts: true
